name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Pull and Build Multi-Platform Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "==============================================================================" 

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 128
          remove-dotnet: 'true'
          remove-haskell: 'true'
          build-mount-path: '/var/lib/docker/'

      - name: Restart docker
        run: sudo service docker restart

      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name mybuilder --use
          docker buildx inspect --bootstrap

      - name: Docker login to Aliyun
        run: |
          echo $ALIYUN_REGISTRY_PASSWORD | docker login $ALIYUN_REGISTRY -u $ALIYUN_REGISTRY_USER --password-stdin

      - name: Pull and Build Multi-Platform Docker Images
        run: |
          # Pull images from the list
          while IFS= read -r line || [ -n "$line" ]; do

            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue

            # Fetch platform if any
            platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')

            # 如果没有指定platform则默认
            if [ -z "$platform" ]; then
              platforms="linux/amd64,linux/arm64"
            else
              platforms="$platform"
            fi

            # 删除platform参数
            clean_line=$(echo "$line" | sed -E 's/--platform[= ]+[a-zA-Z0-9\/,_-]+//g')

            # 解析列
            col_count=$(echo "$clean_line" | awk '{print NF}')

            if [ "$col_count" -eq 1 ]; then
              src_image=$(echo "$clean_line" | awk '{print $1}')
              dst_image=$src_image
            else
              src_image=$(echo "$clean_line" | awk '{print $1}')
              dst_image=$(echo "$clean_line" | awk '{print $2}')
            fi

            src_image="${src_image%%@*}"
            dst_image="${dst_image%%@*}"

            echo "Processing: $src_image -> $dst_image"
            echo "Platforms: $platforms"

            # 生成Dockerfile
            echo "FROM $src_image" > Dockerfile

            # buildx build
            docker buildx build \
              --platform $platforms \
              -t $ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$dst_image \
              --push .

            echo "Done with $dst_image"
          done < images.txt

      - name: Clean up disk space
        run: |
          echo "Cleaning up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="
          docker system prune -af
          echo "Disk space cleaned"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="  
